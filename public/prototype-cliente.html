<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[PROTOTIPO] Paso Cliente</title>
<style>
:root {
  /* Misma paleta que style.css de produccion */
  --primary: oklch(0.47 0.15 262);
  --primary-dark: oklch(0.37 0.13 262);
  --primary-light: oklch(0.94 0.03 262);
  --bg: oklch(0.97 0.006 85);
  --border: oklch(0.9 0.01 85);
  --white: oklch(0.995 0.003 85);
  --text: oklch(0.28 0.015 75);
  --text-light: oklch(0.54 0.02 75);
  --danger: oklch(0.55 0.19 25);
  --success: oklch(0.58 0.13 150);
  --success-bg: oklch(0.94 0.04 150);
  --pend-bg: oklch(0.94 0.01 85);
  --radius: 12px;
  --radius-input: 14px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 15px; line-height: 1.5; min-height: 100dvh;
}
.proto-bar {
  background: oklch(0.25 0.02 262); color: oklch(0.75 0.02 262);
  padding: 6px 12px; font-size: 11px; font-family: ui-monospace, monospace;
  text-align: center; letter-spacing: .04em;
}
.wrap { max-width: 430px; margin: 0 auto; padding: 0 16px 120px; }

/* Header + stepper simulados */
.app-header { display: flex; justify-content: space-between; align-items: baseline; padding: 14px 0 8px; }
.app-header h1 { font-size: 16px; color: var(--primary-dark); font-weight: 700; }
.app-header .who { font-size: 12px; color: var(--text-light); }
.paso-ctx { font-size: 12px; font-weight: 600; color: var(--text-light); margin-bottom: 4px; }
.paso-ctx b { color: var(--primary-dark); }
.paso-rail { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
.paso-rail i { display: block; height: 100%; width: 25%; background: var(--primary); border-radius: 2px; }

/* Pregunta grande */
.pregunta { font-size: 22px; font-weight: 700; line-height: 1.25; margin-bottom: 14px; letter-spacing: -0.01em; }
.pregunta small { display: block; font-size: 13px; font-weight: 400; color: var(--text-light); margin-top: 4px; letter-spacing: 0; }

/* Inputs: 16px para evitar zoom de iOS, targets grandes */
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 12px; font-weight: 700; color: var(--text-light); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
.fg input, .fg select {
  width: 100%; min-height: 48px; padding: 12px 14px;
  border: 1.5px solid var(--border); border-radius: var(--radius-input);
  font-size: 16px; outline: none; background: var(--white); color: var(--text);
}
.fg input:focus, .fg select:focus { border-color: var(--primary); }
.input-lg { min-height: 54px !important; font-size: 17px !important; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  min-height: 48px; padding: 12px 20px; border: none; border-radius: var(--radius-input);
  font-size: 16px; font-weight: 600; cursor: pointer;
  transition: background .18s cubic-bezier(.22,1,.36,1), border-color .18s;
}
.btn-primary { background: var(--primary); color: var(--white); }
.btn-primary:active { background: var(--primary-dark); }
.btn-secondary { background: var(--white); border: 1.5px solid var(--border); color: var(--text); }
.btn-block { display: flex; width: 100%; }
.btn-txt { background: none; border: none; color: var(--primary-dark); font-size: 14px; font-weight: 600; min-height: 44px; padding: 8px 4px; cursor: pointer; }

/* Resultados de busqueda */
.resultados { margin-top: 10px; }
.res-titulo { font-size: 12px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: .04em; margin: 14px 0 6px; }
.res-row {
  display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
  background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 12px 14px; margin-bottom: 8px; cursor: pointer; min-height: 60px;
  font: inherit; color: inherit;
  transition: border-color .18s;
}
.res-row:active { border-color: var(--primary); }
.res-ini {
  width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  background: var(--primary-light); color: var(--primary-dark);
}
.res-ini.prospecto { background: oklch(0.93 0.05 85); color: oklch(0.42 0.08 70); }
.res-main { flex: 1; min-width: 0; }
.res-nombre { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.res-sub { font-size: 12.5px; color: var(--text-light); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.res-tag { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; flex-shrink: 0; }
.res-tag.operam { background: var(--primary-light); color: var(--primary-dark); }
.res-tag.prospecto { background: oklch(0.93 0.05 85); color: oklch(0.42 0.08 70); }
.res-crear {
  border-style: dashed; border-color: oklch(0.82 0.03 262); background: oklch(0.985 0.008 262);
}
.res-crear .res-ini { background: var(--primary); color: var(--white); font-size: 20px; font-weight: 400; }

/* Tarjeta de cliente seleccionado */
.cli-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 18px 16px; }
.cli-nombre { font-size: 18px; font-weight: 700; line-height: 1.3; }
.cli-sub { font-size: 13px; color: var(--text-light); margin-top: 2px; }
.chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 14px; }
.chip { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 999px; }
.chip.ok { background: var(--success-bg); color: oklch(0.32 0.08 150); }
.chip.pend { background: var(--pend-bg); color: var(--text-light); }
.cli-hint { font-size: 12.5px; color: var(--text-light); margin-top: 10px; line-height: 1.45; }
.cli-dom { margin-top: 14px; }

/* Nota de diferimiento */
.nota-flujo { display: flex; gap: 10px; margin-top: 18px; padding: 12px 14px; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); font-size: 12.5px; color: var(--text-light); line-height: 1.5; }

/* Caminos (variante B) */
.camino {
  display: flex; align-items: center; gap: 14px; width: 100%; text-align: left;
  background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius);
  padding: 18px 16px; margin-bottom: 10px; cursor: pointer; font: inherit; color: inherit;
  transition: border-color .18s;
}
.camino:active { border-color: var(--primary); }
.camino-ico { width: 44px; height: 44px; border-radius: var(--radius); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; background: var(--primary-light); color: var(--primary-dark); }
.camino-tit { font-size: 16px; font-weight: 700; }
.camino-desc { font-size: 13px; color: var(--text-light); margin-top: 1px; }
.camino-fl { margin-left: auto; color: var(--text-light); font-size: 18px; }

/* Revelado progresivo (variante C) */
.paso-item { opacity: 0; max-height: 0; overflow: hidden; transition: opacity .25s cubic-bezier(.22,1,.36,1), max-height .3s cubic-bezier(.22,1,.36,1); }
.paso-item.visible { opacity: 1; max-height: 400px; overflow: visible; }
.sugerencias { margin: -6px 0 12px; }
.sug-titulo { font-size: 12px; color: var(--text-light); margin-bottom: 6px; }

.oculto { display: none !important; }
.variant-content { display: none; }
.variant-content.active { display: block; animation: fadein .2s cubic-bezier(.22,1,.36,1); }
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

/* Switcher de variantes */
#switcher {
  position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
  background: oklch(0.25 0.02 262); color: var(--white);
  border-radius: 999px; padding: 8px 10px;
  display: flex; align-items: center; gap: 4px;
  box-shadow: 0 6px 24px oklch(0.2 0.02 262 / .4); z-index: 9999;
  font-size: 13px; user-select: none; max-width: calc(100vw - 24px);
}
#switcher button { background: none; border: none; color: var(--white); cursor: pointer; font-size: 18px; line-height: 1; min-width: 44px; min-height: 40px; opacity: .8; }
#switcher button:active { opacity: 1; }
#switcher .lbl { min-width: 180px; text-align: center; font-weight: 600; font-size: 12.5px; }
#switcher .lbl small { display: block; font-weight: 400; opacity: .65; font-size: 10.5px; }
</style>
</head>
<body>

<div class="proto-bar">[PROTOTIPO THROWAWAY] Paso Cliente &mdash; usa las flechas del switcher para cambiar variante</div>

<div class="wrap">
  <header class="app-header">
    <h1>Peltre Nacional</h1>
    <span class="who">Alejandro</span>
  </header>
  <div class="paso-ctx">Paso <b>1 de 4</b> &middot; Cliente</div>
  <div class="paso-rail"><i></i></div>

  <div class="variant-content" id="va"></div>
  <div class="variant-content" id="vb"></div>
  <div class="variant-content" id="vc"></div>
</div>

<div id="switcher">
  <button onclick="cambiarVariante(-1)" aria-label="Anterior">&#9664;</button>
  <div class="lbl" id="sw-lbl"></div>
  <button onclick="cambiarVariante(1)" aria-label="Siguiente">&#9654;</button>
</div>

<script>
/* ============ DATOS SIMULADOS ============ */
var CLIENTES = [
  { tipo: 'operam', nombre: 'La Vasija Azul SA de CV', corto: 'La Vasija Azul', rfc: 'VAZ990101QX3',
    domicilios: ['Almacen Centro &mdash; CDMX 06600', 'Tienda Coyoacan &mdash; CDMX 04100'] },
  { tipo: 'operam', nombre: 'Distribuidora El Comal', corto: 'El Comal', rfc: 'DCO150612AB1',
    domicilios: ['Bodega Guadalajara &mdash; JAL 44100'] },
  { tipo: 'operam', nombre: 'Hotel Hacienda San Miguel', corto: 'Hda San Miguel', rfc: 'HHS080230K21',
    domicilios: ['Recepcion &mdash; GTO 37700'] },
  { tipo: 'prospecto', nombre: 'Maria Torres', ciudad: 'Guadalajara', celular: '+52 33 1234 5678', etapa: 'Contactado' },
  { tipo: 'prospecto', nombre: 'Ernesto Gil', ciudad: 'Puebla', celular: '+52 22 2345 6789', etapa: 'Nuevo' },
  { tipo: 'prospecto', nombre: 'Lupita Hernandez', ciudad: 'Monterrey', celular: '+52 81 9876 5432', etapa: 'Calificado' }
];
var RECIENTES = [CLIENTES[0], CLIENTES[3]];
var CANALES = ['WhatsApp', 'Llamada', 'Feria / expo', 'Referido', 'Web / redes'];

function iniciales(nombre) {
  var p = nombre.split(' ').filter(function (x) { return x.length > 2 || x === x.toUpperCase(); });
  return ((p[0] || ' ')[0] + ((p[1] || ' ')[0] || '')).toUpperCase().trim();
}
function buscar(q) {
  q = q.toLowerCase().trim();
  if (q.length < 2) return [];
  return CLIENTES.filter(function (c) {
    return c.nombre.toLowerCase().indexOf(q) >= 0 || (c.rfc || '').toLowerCase().indexOf(q) >= 0;
  });
}

/* ============ COMPONENTES COMPARTIDOS ============ */
function filaResultado(c, onclickJs) {
  var sub = c.tipo === 'operam'
    ? c.rfc + ' &middot; ' + c.domicilios.length + (c.domicilios.length === 1 ? ' domicilio' : ' domicilios')
    : c.ciudad + ' &middot; ' + c.etapa;
  var tag = c.tipo === 'operam' ? '<span class="res-tag operam">Operam</span>' : '<span class="res-tag prospecto">Prospecto</span>';
  return '<button class="res-row" onclick="' + onclickJs + '">' +
    '<span class="res-ini ' + c.tipo + '">' + iniciales(c.nombre) + '</span>' +
    '<span class="res-main"><span class="res-nombre">' + c.nombre + '</span>' +
    '<span class="res-sub" style="display:block">' + sub + '</span></span>' + tag + '</button>';
}

function filaCrear(query, onclickJs) {
  return '<button class="res-row res-crear" onclick="' + onclickJs + '">' +
    '<span class="res-ini">+</span>' +
    '<span class="res-main"><span class="res-nombre">Crear contacto &laquo;' + query + '&raquo;</span>' +
    '<span class="res-sub" style="display:block">Solo nombre, celular y ciudad &mdash; suficiente para cotizar</span></span></button>';
}

function tarjetaCliente(c) {
  var esOperam = c.tipo === 'operam';
  var sub = esOperam ? c.rfc + ' &middot; Cliente en Operam'
    : (c.celular || '') + ' &middot; ' + (c.ciudad || '') + (c.etapa ? ' &middot; Prospecto' : ' &middot; Contacto nuevo');
  var dom = '';
  if (esOperam && c.domicilios.length) {
    var opts = c.domicilios.map(function (d) { return '<option>' + d + '</option>'; }).join('');
    dom = '<div class="fg cli-dom"><label>Domicilio de entrega</label><select>' + opts + '</select></div>';
  }
  var chipEntrega = esOperam
    ? '<span class="chip ok">&#10003; Entrega</span>'
    : '<span class="chip pend">Entrega &middot; en paso Env&iacute;o</span>';
  var chipFiscal = esOperam
    ? '<span class="chip ok">&#10003; Fiscal</span>'
    : '<span class="chip pend">Fiscal &middot; al subir a Operam</span>';
  var hint = esOperam ? ''
    : '<div class="cli-hint">Puedes cotizar y mandar por WhatsApp con esto. La direcci&oacute;n se pide al cotizar env&iacute;o; los datos fiscales (CSF) solo si subes el cliente a Operam.</div>';
  return '<div class="cli-card">' +
    '<div class="cli-nombre">' + c.nombre + '</div>' +
    '<div class="cli-sub">' + sub + '</div>' +
    '<div class="chips"><span class="chip ok">&#10003; Contacto</span>' + chipEntrega + chipFiscal + '</div>' +
    hint + dom +
    '<button class="btn btn-primary btn-block" style="margin-top:16px" onclick="alert(\'Aqu\\u00ed pasar\\u00edas al paso 2: Productos\')">Continuar a Productos &rsaquo;</button>' +
    '</div>';
}

function formContacto(idPrefijo, nombrePrefill, onGuardarJs) {
  var opts = CANALES.map(function (c) { return '<option>' + c + '</option>'; }).join('');
  return '<div class="fg"><label>Nombre *</label>' +
    '<input type="text" id="' + idPrefijo + '-nombre" value="' + (nombrePrefill || '') + '" placeholder="Nombre (se acepta sin apellido)"></div>' +
    '<div class="fg"><label>Celular *</label>' +
    '<div style="display:flex;gap:8px"><select style="flex:0 0 92px"><option>+52</option><option>+1</option></select>' +
    '<input type="tel" id="' + idPrefijo + '-cel" inputmode="tel" placeholder="55 1234 5678" style="flex:1"></div></div>' +
    '<div class="fg"><label>Ciudad *</label>' +
    '<input type="text" id="' + idPrefijo + '-ciudad" placeholder="Para estimar env&iacute;o"></div>' +
    '<div class="fg"><label>Canal de origen *</label><select id="' + idPrefijo + '-canal">' + opts + '</select></div>' +
    '<button class="btn btn-primary btn-block" onclick="' + onGuardarJs + '">Guardar y continuar</button>';
}

function notaFlujo() {
  return '<div class="nota-flujo"><span>&#9432;</span><span>' +
    'La <b>direcci&oacute;n de entrega</b> se captura en el paso Env&iacute;o. ' +
    'Los <b>datos fiscales</b> (CSF / RFC) solo se piden si subes el cliente a Operam o factura.</span></div>';
}

/* ============ VARIANTE A: buscador universal ============ */
function renderA() {
  document.getElementById('va').innerHTML =
    '<div class="pregunta">&iquest;Para qui&eacute;n es la cotizaci&oacute;n?' +
    '<small>Busca en Operam y en tus prospectos, o crea un contacto nuevo.</small></div>' +
    '<div class="fg"><input type="text" id="a-q" class="input-lg" placeholder="Nombre, empresa o RFC..." autocomplete="off" oninput="aBuscar()"></div>' +
    '<div id="a-zona"></div>' + notaFlujo();
  aRecientes();
}
function aRecientes() {
  var html = '<div class="res-titulo">Recientes</div>' +
    RECIENTES.map(function (c) { return filaResultado(c, 'aSel(' + CLIENTES.indexOf(c) + ')'); }).join('');
  document.getElementById('a-zona').innerHTML = html;
}
function aBuscar() {
  var q = document.getElementById('a-q').value;
  var zona = document.getElementById('a-zona');
  if (q.trim().length < 2) { aRecientes(); return; }
  var res = buscar(q);
  var html = res.map(function (c) { return filaResultado(c, 'aSel(' + CLIENTES.indexOf(c) + ')'); }).join('');
  html += filaCrear(q, 'aCrear()');
  zona.innerHTML = html;
}
function aSel(i) {
  document.getElementById('a-zona').innerHTML = tarjetaCliente(CLIENTES[i]) +
    '<button class="btn-txt" onclick="renderA()">&lsaquo; Cambiar de cliente</button>';
  document.getElementById('a-q').classList.add('oculto');
  document.querySelector('#va .pregunta').innerHTML = 'Cliente seleccionado';
}
function aCrear() {
  var q = document.getElementById('a-q').value.trim();
  document.getElementById('a-q').classList.add('oculto');
  document.querySelector('#va .pregunta').innerHTML = 'Contacto nuevo<small>Lo m&iacute;nimo para cotizar. Queda guardado como prospecto.</small>';
  document.getElementById('a-zona').innerHTML = formContacto('a', q, 'aGuardar()') +
    '<button class="btn-txt" onclick="renderA()">&lsaquo; Volver a buscar</button>';
}
function aGuardar() {
  var c = { tipo: 'nuevo', nombre: document.getElementById('a-nombre').value || 'Sin nombre',
    celular: '+52 ' + (document.getElementById('a-cel').value || '...'),
    ciudad: document.getElementById('a-ciudad').value || '...' };
  document.querySelector('#va .pregunta').innerHTML = 'Contacto creado';
  document.getElementById('a-zona').innerHTML = tarjetaCliente(c) +
    '<button class="btn-txt" onclick="renderA()">&lsaquo; Cambiar de cliente</button>';
}

/* ============ VARIANTE B: dos caminos explicitos ============ */
function renderB() {
  document.getElementById('vb').innerHTML =
    '<div class="pregunta">&iquest;Para qui&eacute;n es la cotizaci&oacute;n?</div>' +
    '<button class="camino" onclick="bCaminoBuscar()">' +
    '<span class="camino-ico">&#128269;</span>' +
    '<span><span class="camino-tit" style="display:block">Ya lo conozco</span>' +
    '<span class="camino-desc">Buscar en Operam o en mis prospectos</span></span>' +
    '<span class="camino-fl">&rsaquo;</span></button>' +
    '<button class="camino" onclick="bCaminoNuevo()">' +
    '<span class="camino-ico">+</span>' +
    '<span><span class="camino-tit" style="display:block">Contacto nuevo</span>' +
    '<span class="camino-desc">Solo nombre, celular y ciudad</span></span>' +
    '<span class="camino-fl">&rsaquo;</span></button>' +
    notaFlujo();
}
function bCaminoBuscar() {
  document.getElementById('vb').innerHTML =
    '<div class="pregunta">Buscar cliente<small>Operam y prospectos en una sola b&uacute;squeda.</small></div>' +
    '<div class="fg"><input type="text" id="b-q" class="input-lg" placeholder="Nombre, empresa o RFC..." autocomplete="off" oninput="bBuscar()"></div>' +
    '<div id="b-zona"><div class="res-titulo">Recientes</div>' +
    RECIENTES.map(function (c) { return filaResultado(c, 'bSel(' + CLIENTES.indexOf(c) + ')'); }).join('') + '</div>' +
    '<button class="btn-txt" onclick="renderB()">&lsaquo; Volver</button>';
}
function bBuscar() {
  var q = document.getElementById('b-q').value;
  var res = buscar(q);
  var html = res.map(function (c) { return filaResultado(c, 'bSel(' + CLIENTES.indexOf(c) + ')'); }).join('');
  if (q.trim().length >= 2) html += filaCrear(q, 'bCaminoNuevo(document.getElementById(\'b-q\').value)');
  document.getElementById('b-zona').innerHTML = html;
}
function bSel(i) {
  document.getElementById('vb').innerHTML =
    '<div class="pregunta">Cliente seleccionado</div>' + tarjetaCliente(CLIENTES[i]) +
    '<button class="btn-txt" onclick="renderB()">&lsaquo; Cambiar de cliente</button>';
}
function bCaminoNuevo(prefill) {
  document.getElementById('vb').innerHTML =
    '<div class="pregunta">Contacto nuevo<small>Lo m&iacute;nimo para cotizar. Queda guardado como prospecto.</small></div>' +
    formContacto('b', typeof prefill === 'string' ? prefill : '', 'bGuardar()') +
    '<button class="btn-txt" onclick="renderB()">&lsaquo; Volver</button>';
}
function bGuardar() {
  var c = { tipo: 'nuevo', nombre: document.getElementById('b-nombre').value || 'Sin nombre',
    celular: '+52 ' + (document.getElementById('b-cel').value || '...'),
    ciudad: document.getElementById('b-ciudad').value || '...' };
  document.getElementById('vb').innerHTML =
    '<div class="pregunta">Contacto creado</div>' + tarjetaCliente(c) +
    '<button class="btn-txt" onclick="renderB()">&lsaquo; Cambiar de cliente</button>';
}

/* ============ VARIANTE C: revelado progresivo ============ */
function renderC() {
  document.getElementById('vc').innerHTML =
    '<div class="pregunta">Empecemos por el contacto<small>Escribe el nombre; si ya existe te lo sugerimos.</small></div>' +
    '<div class="fg"><label>Nombre o empresa *</label>' +
    '<input type="text" id="c-nombre" class="input-lg" autocomplete="off" placeholder="Ej. Maria Torres" oninput="cNombre()"></div>' +
    '<div id="c-sug" class="sugerencias"></div>' +
    '<div class="paso-item" id="c-p2"><div class="fg"><label>Celular *</label>' +
    '<div style="display:flex;gap:8px"><select style="flex:0 0 92px"><option>+52</option><option>+1</option></select>' +
    '<input type="tel" id="c-cel" inputmode="tel" placeholder="55 1234 5678" style="flex:1" oninput="cCel()"></div></div></div>' +
    '<div class="paso-item" id="c-p3">' +
    '<div class="fg"><label>Ciudad *</label><input type="text" id="c-ciudad" placeholder="Para estimar env&iacute;o" oninput="cCiudad()"></div>' +
    '<div class="fg"><label>Canal de origen *</label><select>' +
    CANALES.map(function (x) { return '<option>' + x + '</option>'; }).join('') + '</select></div></div>' +
    '<div class="paso-item" id="c-p4">' +
    '<button class="btn btn-primary btn-block" onclick="cGuardar()">Guardar contacto y continuar</button></div>' +
    '<div id="c-zona"></div>' + notaFlujo();
}
function cNombre() {
  var q = document.getElementById('c-nombre').value;
  var sug = document.getElementById('c-sug');
  var res = buscar(q);
  if (res.length && q.trim().length >= 2) {
    sug.innerHTML = '<div class="sug-titulo">&iquest;Es alguno de estos?</div>' +
      res.slice(0, 3).map(function (c) { return filaResultado(c, 'cSel(' + CLIENTES.indexOf(c) + ')'); }).join('');
  } else {
    sug.innerHTML = '';
  }
  document.getElementById('c-p2').classList.toggle('visible', q.trim().length >= 3);
  cCel();
}
function cCel() {
  var ok = (document.getElementById('c-cel').value.replace(/\D/g, '').length >= 8);
  document.getElementById('c-p3').classList.toggle('visible', ok);
  cCiudad();
}
function cCiudad() {
  var el = document.getElementById('c-ciudad');
  var ok = el && el.value.trim().length >= 3 && document.getElementById('c-p3').classList.contains('visible');
  document.getElementById('c-p4').classList.toggle('visible', !!ok);
}
function cSel(i) {
  document.getElementById('vc').innerHTML =
    '<div class="pregunta">Cliente seleccionado</div>' + tarjetaCliente(CLIENTES[i]) +
    '<button class="btn-txt" onclick="renderC()">&lsaquo; Cambiar de cliente</button>';
}
function cGuardar() {
  var c = { tipo: 'nuevo', nombre: document.getElementById('c-nombre').value || 'Sin nombre',
    celular: '+52 ' + (document.getElementById('c-cel').value || '...'),
    ciudad: document.getElementById('c-ciudad').value || '...' };
  document.getElementById('vc').innerHTML =
    '<div class="pregunta">Contacto creado</div>' + tarjetaCliente(c) +
    '<button class="btn-txt" onclick="renderC()">&lsaquo; Cambiar de cliente</button>';
}

/* ============ SWITCHER ============ */
var VARIANTES = [
  { id: 'va', lbl: 'A &middot; Buscador universal', sub: 'un campo, todo junto', render: renderA },
  { id: 'vb', lbl: 'B &middot; Dos caminos', sub: 'decisi&oacute;n expl&iacute;cita primero', render: renderB },
  { id: 'vc', lbl: 'C &middot; Revelado progresivo', sub: 'los campos aparecen al llenar', render: renderC }
];
var vAct = 0;
function mostrarVariante() {
  VARIANTES.forEach(function (v, i) {
    document.getElementById(v.id).classList.toggle('active', i === vAct);
  });
  VARIANTES[vAct].render();
  document.getElementById('sw-lbl').innerHTML = VARIANTES[vAct].lbl + '<small>' + VARIANTES[vAct].sub + '</small>';
}
function cambiarVariante(d) {
  vAct = (vAct + d + VARIANTES.length) % VARIANTES.length;
  mostrarVariante();
}
document.addEventListener('keydown', function (e) {
  if (e.key === 'ArrowLeft') cambiarVariante(-1);
  if (e.key === 'ArrowRight') cambiarVariante(1);
});
mostrarVariante();
</script>
